services:
  - type: web
    name: api-server
    plan: free
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: |
      pnpm install --no-frozen-lockfile --prefer-online
      pnpm run build
    startCommand: pnpm run dev
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: "postgresql://postgres.kzhkodyfqzgboxsgeiuy:saideeparchit@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres"
    autoDeploy: true

  - type: web
    name: scotland-yard-frontend
    plan: free
    runtime: node
    rootDir: artifacts/scotland-yard
    buildCommand: |
      pnpm install --no-frozen-lockfile 
      pnpm run build
    startCommand: pnpm run dev
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api-server.onrender.com
      - key: VITE_WS_URL
        value: wss://api-server.onrender.com/api/ws
    autoDeploy: true